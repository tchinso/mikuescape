<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floor Escape Prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.2/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.181.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <div class="hud hud-main" aria-live="polite">
        <div class="floor-chip">
          <span class="label">현재 층</span>
          <strong id="floorValue">13F</strong>
        </div>
        <div class="stat-row">
          <span>동료</span>
          <strong id="friendValue">0 / 12</strong>
        </div>
        <div class="stat-row">
          <span>다음</span>
          <strong id="nextValue">-</strong>
        </div>
      </div>

      <div class="hud roster">
        <div class="roster-title">합류</div>
        <div id="rosterList" class="roster-list"></div>
      </div>

      <div class="hud motion-readout">
        <span id="motionName">Player</span>
        <strong id="motionState">idle</strong>
      </div>

      <div class="hud controls">
        <button id="skipButton" type="button" aria-label="다음 테스트 단계">⏭</button>
        <button id="resetButton" type="button" aria-label="처음부터 다시 시작">↻</button>
      </div>

      <div id="message" class="message hidden"></div>
      <div id="loading" class="loading">
        <strong>모델 불러오는 중</strong>
        <span id="loadingDetail">0 / 13</span>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
