<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>루루 월드 - 별빛 왕국의 항해</title>
    <style>
        :root {
            color-scheme: dark;
            --ink: #f7ecce;
            --muted: rgba(247, 236, 206, 0.7);
            --panel: rgba(16, 22, 43, 0.72);
            --line: rgba(255, 224, 158, 0.32);
            --accent: #74eed9;
            --rose: #ff7ac8;
            --gold: #e7bc5c;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0f1835;
            font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #screen-effects {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 232, 172, 0.08), rgba(116, 238, 217, 0.03) 45%, rgba(17, 20, 46, 0.18)),
                radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 48%, rgba(6, 9, 24, 0.34) 100%);
            mix-blend-mode: soft-light;
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        #top-bar {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .hud-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: min(900px, calc(100vw - 240px));
        }

        .hud-box {
            min-height: 34px;
            padding: 9px 13px;
            border-radius: 8px;
            color: var(--ink);
            background: linear-gradient(180deg, rgba(27, 36, 72, 0.76), rgba(12, 17, 37, 0.7));
            border: 1px solid var(--line);
            box-shadow: 0 10px 28px rgba(5, 10, 28, 0.28), inset 0 1px 0 rgba(255, 244, 206, 0.18);
            font-weight: 800;
            line-height: 1.2;
            backdrop-filter: blur(10px);
        }

        .hud-box small {
            display: block;
            margin-bottom: 2px;
            color: rgba(116, 238, 217, 0.76);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        #gold-display {
            color: #ffe29c;
            text-shadow: 0 0 12px rgba(231, 188, 92, 0.42);
        }

        #minimap-container {
            width: 172px;
            height: 172px;
            border-radius: 50%;
            border: 5px solid rgba(255, 224, 158, 0.72);
            box-shadow: 0 12px 32px rgba(5, 10, 28, 0.34), inset 0 0 24px rgba(116, 238, 217, 0.18);
            position: relative;
            background: rgba(9, 18, 42, 0.28);
            overflow: hidden;
            flex: 0 0 auto;
        }

        #minimap-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 15px solid var(--rose);
            transform: translate(-50%, -50%);
            z-index: 2;
            filter: drop-shadow(0 0 8px rgba(255, 122, 200, 0.8));
        }

        #monster-minimap-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .monster-dot {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ff2f4f;
            border: 1px solid rgba(255, 245, 210, 0.86);
            box-shadow: 0 0 9px rgba(255, 47, 79, 0.92);
            transform: translate(-50%, -50%);
        }

        .monster-dot.tank {
            width: 8px;
            height: 8px;
            background: #d7263d;
        }

        .monster-dot.boss {
            width: 11px;
            height: 11px;
            background: #ff174d;
            box-shadow: 0 0 13px rgba(255, 23, 77, 1);
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 7px;
            height: 7px;
            background: rgba(255, 242, 184, 0.95);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(116, 238, 217, 0.32), 0 0 14px rgba(116, 238, 217, 0.62);
        }

        #interaction-prompt,
        #toast {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--ink);
            background: rgba(16, 22, 43, 0.82);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 14px 32px rgba(5, 10, 28, 0.34), inset 0 1px 0 rgba(255, 244, 206, 0.16);
            backdrop-filter: blur(10px);
            font-weight: 850;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        #interaction-prompt {
            bottom: 156px;
            padding: 9px 14px;
            pointer-events: none;
        }

        #toast {
            top: 84px;
            padding: 10px 16px;
        }

        #interaction-prompt.visible,
        #toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(-3px);
        }

        #interaction-prompt.visible {
            cursor: pointer;
            pointer-events: auto;
        }

        #dialog {
            position: absolute;
            left: 50%;
            bottom: 26px;
            width: min(620px, calc(100vw - 32px));
            transform: translateX(-50%) translateY(16px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        #dialog.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .dialog-panel {
            padding: 16px 18px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(28, 34, 65, 0.9), rgba(13, 18, 38, 0.9));
            border: 1px solid rgba(255, 224, 158, 0.38);
            box-shadow: 0 20px 46px rgba(4, 8, 22, 0.48), inset 0 1px 0 rgba(255, 244, 206, 0.14);
            color: var(--ink);
            backdrop-filter: blur(12px);
        }

        #dialog-title {
            margin: 0 0 8px;
            color: #ffe29c;
            font-size: 22px;
            letter-spacing: 0;
        }

        #dialog-body {
            margin: 0 0 12px;
            line-height: 1.55;
            font-weight: 650;
            color: rgba(247, 236, 206, 0.84);
            white-space: pre-line;
        }

        #dialog-menu {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        #dialog-menu li {
            min-height: 34px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(116, 238, 217, 0.1);
            border: 1px solid rgba(116, 238, 217, 0.24);
            font-size: 13px;
            font-weight: 850;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
        }

        #dialog-menu li:hover {
            background: rgba(116, 238, 217, 0.18);
            border-color: rgba(116, 238, 217, 0.42);
            transform: translateY(-1px);
        }

        #dialog-menu li.disabled {
            cursor: default;
            opacity: 0.48;
            background: rgba(247, 236, 206, 0.06);
            border-color: rgba(247, 236, 206, 0.14);
            transform: none;
        }

        #bottom-bar {
            padding: 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }

        .avatar-diamond {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, var(--rose), var(--accent));
            border: 4px solid rgba(255, 238, 184, 0.9);
            transform: rotate(45deg);
            box-shadow: 0 0 24px rgba(255, 122, 200, 0.35), 5px 5px 0 rgba(5, 10, 28, 0.24);
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .avatar-diamond span {
            transform: rotate(-45deg);
            font-size: 22px;
            font-weight: 950;
            color: white;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
        }

        .bars {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-container {
            height: 14px;
            background: rgba(10, 16, 35, 0.64);
            border: 2px solid rgba(255, 224, 158, 0.72);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.34);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.16s ease;
        }

        #hp-bar {
            background: linear-gradient(90deg, #ff5d8e, #ffb066);
            width: 100%;
        }

        #stamina-bar {
            background: linear-gradient(90deg, var(--accent), #77b8ff);
            width: 100%;
        }

        #pause-menu {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(15, 24, 53, 0.52), rgba(10, 12, 28, 0.88)),
                radial-gradient(ellipse at 50% 20%, rgba(116, 238, 217, 0.2), rgba(13, 18, 38, 0.12) 48%, rgba(4, 7, 18, 0.8));
            backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--ink);
            z-index: 100;
            transition: opacity 0.32s ease;
            pointer-events: auto;
            text-align: center;
            padding: 24px;
        }

        #pause-menu h1 {
            margin: 0;
            color: #ffe29c;
            font-size: clamp(42px, 8vw, 78px);
            letter-spacing: 0;
            line-height: 1;
            text-shadow: 0 0 34px rgba(231, 188, 92, 0.42), 0 4px 18px rgba(0, 0, 0, 0.42);
        }

        #pause-menu p {
            margin: 12px 0 0;
            color: var(--accent);
            font-size: 18px;
            font-weight: 900;
            text-shadow: 0 0 18px rgba(116, 238, 217, 0.42);
        }

        button {
            margin-top: 28px;
            padding: 15px 42px;
            border: 0;
            border-radius: 8px;
            background: linear-gradient(180deg, #ffe29c, #d79b3d);
            color: #18213e;
            cursor: pointer;
            font-size: 19px;
            font-weight: 950;
            box-shadow: 0 0 28px rgba(231, 188, 92, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.48);
        }

        button:hover {
            transform: translateY(-2px);
        }

        .key-hint {
            margin-top: 22px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            font-weight: 750;
        }

        #fps-hud {
            position: fixed;
            right: 12px;
            bottom: 12px;
            padding: 6px 9px;
            border-radius: 8px;
            background: rgba(8, 13, 30, 0.46);
            color: rgba(255, 239, 194, 0.95);
            font-family: Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            z-index: 90;
            pointer-events: none;
            white-space: nowrap;
        }

        #touch-controls {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
        }

        .joystick {
            position: absolute;
            bottom: 28px;
            width: 116px;
            height: 116px;
            border-radius: 50%;
            border: 1px solid rgba(255, 224, 158, 0.42);
            background: radial-gradient(circle at 50% 50%, rgba(116, 238, 217, 0.12), rgba(16, 22, 43, 0.52));
            box-shadow: inset 0 0 26px rgba(116, 238, 217, 0.16), 0 12px 28px rgba(5, 10, 28, 0.34);
            pointer-events: auto;
            touch-action: none;
        }

        #move-joystick {
            left: 22px;
        }

        #look-joystick {
            right: 22px;
        }

        .joystick-knob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255, 242, 184, 0.92), rgba(116, 238, 217, 0.74));
            box-shadow: 0 0 18px rgba(116, 238, 217, 0.5);
            transform: translate(-50%, -50%);
        }

        #touch-fire {
            position: absolute;
            right: 154px;
            bottom: 54px;
            width: 64px;
            height: 64px;
            margin: 0;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 224, 158, 0.46);
            background: linear-gradient(180deg, rgba(255, 122, 200, 0.92), rgba(174, 57, 110, 0.82));
            color: white;
            font-size: 18px;
            line-height: 1;
            pointer-events: auto;
            touch-action: none;
        }

        @media (max-width: 720px) {
            #top-bar {
                padding: 12px;
            }

            .hud-stack {
                max-width: calc(100vw - 142px);
            }

            .hud-box {
                padding: 7px 9px;
                font-size: 13px;
            }

            #minimap-container {
                width: 116px;
                height: 116px;
                border-width: 4px;
            }

            #dialog-menu {
                grid-template-columns: 1fr;
            }

            .bars {
                width: 166px;
            }

        }

        @media (pointer: coarse) {
            #touch-controls {
                display: block;
            }

            #bottom-bar {
                padding-bottom: 158px;
            }
        }
    </style>
</head>
<body>
    <div id="screen-effects"></div>

    <div id="ui-layer">
        <div id="fps-hud">-- FPS</div>
        <div id="top-bar">
            <div class="hud-stack">
                <div class="hud-box">
                    <small>LOCATION</small>
                    <span id="location-display">루루 아카데미</span>
                </div>
                <div class="hud-box">
                    <small>POS</small>
                    <span id="pos-display">0, 0</span>
                </div>
                <div class="hud-box">
                    <small>GOLD</small>
                    <span id="gold-display">999,999,999 G</span>
                </div>
                <div class="hud-box">
                    <small>HP</small>
                    <span id="hp-display">100 / 100</span>
                </div>
                <div class="hud-box">
                    <small>AMMO</small>
                    <span id="ammo-display">36</span>
                </div>
                <div class="hud-box">
                    <small>CARGO</small>
                    <span id="cargo-display">0 / 10</span>
                </div>
                <div class="hud-box">
                    <small>GEAR</small>
                    <span id="gear-display">기본 마력총</span>
                </div>
                <div class="hud-box">
                    <small>BOAT</small>
                    <span id="boat-display">미보유</span>
                </div>
            </div>
            <div id="minimap-container">
                <div id="monster-minimap-layer"></div>
                <div id="minimap-arrow"></div>
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="interaction-prompt"></div>
        <div id="toast"></div>
        <div id="touch-controls" aria-hidden="false">
            <div id="move-joystick" class="joystick" aria-label="이동 조이스틱">
                <div class="joystick-knob"></div>
            </div>
            <button id="touch-fire" type="button" aria-label="발사">F</button>
            <div id="look-joystick" class="joystick" aria-label="카메라 조이스틱">
                <div class="joystick-knob"></div>
            </div>
        </div>

        <div id="dialog" aria-live="polite">
            <div class="dialog-panel">
                <h2 id="dialog-title">장소</h2>
                <p id="dialog-body"></p>
                <ul id="dialog-menu"></ul>
            </div>
        </div>

        <div id="bottom-bar">
            <div class="avatar-diamond">
                <span>R</span>
            </div>
            <div class="bars">
                <div class="bar-container"><div id="hp-bar" class="bar-fill"></div></div>
                <div class="bar-container"><div id="stamina-bar" class="bar-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="pause-menu">
        <h1>루루 월드</h1>
        <p>별빛 왕국의 항해</p>
        <button id="start-btn">탐험 시작</button>
        <div class="key-hint">왕도와 항구, 고대 유적을 잇는 작은 모험</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="js/config.js?v=20260613-controls2"></script>
    <script src="js/fantasy-visuals.js?v=20260613-fantasy4"></script>
    <script src="js/collision-engine.js?v=20260613-fantasy4"></script>
    <script src="js/ui-engine.js?v=20260613-controls2"></script>
    <script src="js/map-engine.js?v=20260613-monsters1"></script>
    <script src="js/player-engine.js?v=20260613-controls2"></script>
    <script src="js/monster-engine.js?v=20260613-controls2"></script>
    <script src="js/game-engine.js?v=20260613-controls2"></script>
</body>
</html>
